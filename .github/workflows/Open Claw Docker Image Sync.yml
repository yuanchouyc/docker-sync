name: Open Claw Docker Image Sync

on:
  workflow_dispatch: # 允许手动触发同步任务

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to Aliyun Registry
        run: |
          # 开启错误终止：任意命令失败则脚本立即停止
          set -euo pipefail
          # 登录阿里云个人版容器仓库
          docker login \
            --username=${{ secrets.ALIYUN_USERNAME }} \
            --password=${{ secrets.ALIYUN_PASSWORD }} \
            crpi-b1d7nxilfjr3gdz1.cn-beijing.personal.cr.aliyuncs.com

      - name: Pull and Push OpenClaw Images
        run: |
          set -euo pipefail
          # 定义阿里云仓库前缀（只需改这里的命名空间）
          ALI_REPO="crpi-b1d7nxilfjr3gdz1.cn-beijing.personal.cr.aliyuncs.com/iincs-lab/openclaw"
          
          # 1. 同步核心镜像（stable标签，官方主推）
          docker pull openclaw/core:stable
          docker tag openclaw/core:stable ${ALI_REPO}/core:stable
          docker push ${ALI_REPO}/core:stable

          # 2. 同步可视化面板（修复：使用官方latest标签，无stable）
          docker pull openclaw/dashboard:latest
          docker tag openclaw/dashboard:latest ${ALI_REPO}/dashboard:latest
          # 可选：给dashboard加stable别名，方便统一标签使用
          docker tag openclaw/dashboard:latest ${ALI_REPO}/dashboard:stable
          docker push ${ALI_REPO}/dashboard:latest
          docker push ${ALI_REPO}/dashboard:stable

      - name: Finish
        run: echo "OpenClaw镜像同步任务完成！"
